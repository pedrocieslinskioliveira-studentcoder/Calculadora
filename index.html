<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Estilo Inova</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calculator">
    <div class="brand">
        <span>inova</span>
        <small>8-DÍGITOS</small>
    </div>

    <input type="text" id="display" readonly>

    <div class="keys">
        <button class="btn blue">MRC</button>
        <button class="btn blue">M-</button>
        <button class="btn blue">M+</button>
        <button class="btn red" onclick="clearDisplay()">OFF</button>
        <button class="btn red" onclick="clearDisplay()">ON/C</button>

        <button class="btn blue" onclick="append('7')">7</button>
        <button class="btn blue" onclick="append('8')">8</button>
        <button class="btn blue" onclick="append('9')">9</button>
        <button class="btn gray" onclick="append('%')">%</button>
        <button class="btn gray" onclick="sqrt()">√</button>

        <button class="btn blue" onclick="append('4')">4</button>
        <button class="btn blue" onclick="append('5')">5</button>
        <button class="btn blue" onclick="append('6')">6</button>
        <button class="btn gray" onclick="append('*')">×</button>
        <button class="btn gray" onclick="append('/')">÷</button>

        <button class="btn blue" onclick="append('1')">1</button>
        <button class="btn blue" onclick="append('2')">2</button>
        <button class="btn blue" onclick="append('3')">3</button>
        <button class="btn gray plus" onclick="append('+')">+</button>
        <button class="btn gray" onclick="append('-')">−</button>

        <button class="btn blue" onclick="append('0')">0</button>
        <button class="btn blue" onclick="append('.')">.</button>
        <button class="btn blue" onclick="toggleSign()">+/-</button>
        <button class="btn gray equal" onclick="calculate()">=</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
